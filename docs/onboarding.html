   <p>The AiGovOps Library is a governed core for AI agents — and a connected set of pages that explain it, show it run, and let you operate it. This guided tour walks every page, what you can do at each stop, and how to drive the whole thing through <b>Jeeves</b> and the governed agents.</p>

   vo:"Welcome to the AiGovOps Library. It's a governed core for AI agents, wrapped in a connected set of pages that explain it, show it running, and let you operate it. This tour walks every page, tells you what you can do at each stop, and shows how to run the whole thing through Jeeves and the governed agents. Press play to let it narrate itself, or move at your own pace.",

  {ch:"Start here", title:"The Hub — the six pieces", src:"index.html",

  {ch:"The six pieces", title:"WHY — The Demo", src:"demo.html",

  {ch:"The six pieces", title:"WALK — The Rooms", src:"rooms.html",
   vo:"Piece three: the Rooms. Six interactive rooms — Reception, Reading Room, Makerspace, Commons, Human Library, and the Coffee Shop — running live on the governed core. Walking the rooms is the friendliest way to feel how the system works.",
   doLabel:"Here you can", do:["Walk six live rooms","Meet the agents in each"]},

  {ch:"The six pieces", title:"BUILD — The Blueprint", src:"blueprint.html",
   vo:"Piece four: the Blueprint — the deployable architecture, section by section. The principles, the one-core-many-surfaces shape, deployment topologies, the backend, the rooms, the agent-first design, the request lifecycle, and safety. This is the engineering source of truth.",
   doLabel:"Here you can", do:["Read the architecture","See deployment topologies"], jeeves:["What frameworks apply to my model?"]},

  {ch:"The six pieces", title:"OPERATE — The Plan", src:"plan.html",
   vo:"Piece five: the Plan — how agents, skills, and humans actually run the Library. The cast of library staff, the skills they wield, the repeatable evidence-producing processes, and the garden of human delight. This is the operating manual.",

  {ch:"Jeeves & the governed loop", title:"Meet Jeeves",
   panel:`<div class="kicker">Jeeves · the concierge</div><h2>Ask for the outcome. Jeeves does the bureaucracy.</h2>
   <p>Jeeves is the agent-first front of the Library — not a person, and not a he or a she. It's an agent. You ask for an outcome in plain language; Jeeves drafts the work, runs anything reversible, and <b>pauses anything irreversible for a human</b>. It never holds the keys.</p>
   <p>Try these starters, straight from the home page:</p>
   <div class="chips"><span class="chip">Draft a PR to update the agents page</span><span class="chip">What frameworks apply to my model?</span><span class="chip">Run the gate self-test</span><span class="chip">Show me the latest signed receipts</span></div>
   <p style="margin-top:16px">Every Jeeves action is classified by the policy engine, scoped by your identity, and left as a signed receipt — so the convenience never costs you the audit trail.</p>`,
   vo:"Meet Jeeves — the concierge at the top of every page. Jeeves is an agent, not a person, with no gender. You ask for an outcome in plain language, and Jeeves does the bureaucracy: it drafts the work, runs anything reversible, and pauses anything irreversible for a human to approve. It never holds the keys. Try asking Jeeves to draft a pull request, to check which frameworks apply to your model, to run the gate self-test, or to show the latest signed receipts.",
   doLabel:"Ask Jeeves", jeeves:["Draft a PR to update the agents page","Run the gate self-test"]},

  {ch:"Jeeves & the governed loop", title:"The Yes-Gate loop",
   panel:`<div class="kicker">The governed loop</div><h2>Propose → human-decide → broker → run sandboxed → verify.</h2>
   <p>Every effectful action an agent takes runs the same five-step loop. Reversible work flows straight through; anything irreversible stops at the human gate. Nothing reaches a real secret or a real system except through this path.</p>
   <div class="loopgrid">
     <div class="loopstep"><div class="s">01</div><h4>Propose</h4><p>The agent states the intent; the policy engine classifies it.</p></div>
     <div class="loopstep"><div class="s">02</div><h4>Human-decide</h4><p>Irreversible? A human approves or denies — recorded as a signed receipt.</p></div>
     <div class="loopstep"><div class="s">03</div><h4>Broker</h4><p>On approval, a short-lived, scoped token is minted. The agent never sees a master secret.</p></div>
     <div class="loopstep"><div class="s">04</div><h4>Run sandboxed</h4><p>The tool runs isolated — no ambient network or filesystem; egress only where declared.</p></div>
     <div class="loopstep"><div class="s">05</div><h4>Verify</h4><p>The effect is checked and chained into the signed ledger. Tamper shows.</p></div>
   </div>
   <p>This is the spine the whole Library is built to protect.</p>`,
   vo:"Underneath Jeeves is one loop, run for every effectful action: propose, human-decide, broker, run sandboxed, and verify. The agent proposes an intent and the policy engine classifies it. If it's irreversible, a human approves or denies — and that decision is itself a signed receipt. On approval, a short-lived scoped token is brokered, so the agent never touches a master secret. The tool then runs sandboxed, with no ambient network or filesystem, and the result is verified and chained into the signed ledger. Reversible work flows straight through; the irreversible always waits for a human.",
   doLabel:"The five steps", do:["Propose","Human-decide","Broker","Run sandboxed","Verify"]},

  {ch:"Jeeves & the governed loop", title:"Govern Any Agent", src:"connect.html",
   vo:"You can put your own agent inside this loop. Govern Any Agent is the connector: point any M-C-P client — Claude Code, Desktop, Cursor — at the governed core, and its effectful actions inherit the gate, the broker, the sandbox, and a signed receipt for each one. Zero dependencies to install.",
   doLabel:"Here you can", do:["Connect any MCP agent","See the tools it exposes","Install in seconds"], jeeves:["List the tools the connector exposes"]},

  {ch:"Manage it with agents", title:"The Control Room",
   panel:`<div class="kicker">Operate · the console</div><h2>Watch everything. Hold the kill switch.</h2>

   vo:"To manage it all, the running core ships a Control Room. It's one role-scoped surface: an agentic chat where you type a request and the local model drafts a plan you approve inline; a live oversight ledger tailing every signed receipt; a steward-only kill switch that halts in-flight work and signs its own receipt; and a capability dial that sets each member's limits on level, spend, rate, and blast radius. Founders see everything and hold the global kill switch; members see and pause only their own work.",

// ——— Player ———
const $=id=>document.getElementById(id);
const frame=$('frame'), panel=$('panel'), toc=$('toc');
let idx=0, playing=false, narrate=true, timer=null;

// build chapter nav
(function buildToc(){
  let lastCh=null, html='';
  SCENES.forEach((s,i)=>{
    if(s.ch!==lastCh){ html+=`<div class="chap">${s.ch}</div>`; lastCh=s.ch; }
    html+=`<button class="scene-btn" data-i="${i}" type="button"><span class="n">${String(i+1).padStart(2,'0')}</span>${s.title}</button>`;
  });
  toc.innerHTML=html;
  toc.querySelectorAll('.scene-btn').forEach(b=>b.addEventListener('click',()=>go(+b.dataset.i)));
})();

function render(){
  const s=SCENES[idx];
  // stage
  if(s.src){
    const url = /^https?:\/\//.test(s.src) ? s.src : './'+s.src;
    frame.classList.add('show'); panel.classList.remove('show');
    if(frame.getAttribute('src')!==url) frame.setAttribute('src',url);
    $('openLink').hidden=false; $('openLink').href=url;
  } else {
    frame.classList.remove('show'); panel.classList.add('show');
    panel.innerHTML=s.panel||''; $('openLink').hidden=true;
    frame.removeAttribute('src');
  }
  // caption
  $('capMeta').textContent=`${s.ch}  ·  ${s.title}`;
  $('capVo').textContent=s.vo;
  let chips='';
  if(s.do && s.do.length){ chips+=`<b>${s.doLabel||'Here you can'}:</b>`+s.do.map(d=>`<span class="pill">${d}</span>`).join(''); }
  if(s.jeeves && s.jeeves.length){ chips+=s.jeeves.map(j=>`<span class="pill jeeves">"${j}"</span>`).join(''); }
  $('capDo').innerHTML=chips;
  // nav state
  toc.querySelectorAll('.scene-btn').forEach(b=>b.classList.toggle('active',+b.dataset.i===idx));
  const active=toc.querySelector('.scene-btn.active'); if(active) active.scrollIntoView({block:'nearest'});
  $('counter').textContent=`${idx+1} / ${SCENES.length}`;
  $('barFill').style.width=((idx)/(SCENES.length-1)*100)+'%';
  // animated Beacon start for each scene (icon pop + ring sweep); restart by reflow
  const pe=$('persona'); if(pe){ pe.classList.remove('intro'); void pe.offsetWidth; pe.classList.add('intro'); }
}

function speak(onEnd){
  if(!('speechSynthesis' in window)){ return scheduleTimer(onEnd); }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(SCENES[idx].vo);
  u.rate=1.0; u.pitch=1.0;
  u.onend=()=>{ if(playing) onEnd(); };
  u.onerror=()=>{ if(playing) scheduleTimer(onEnd); };
  speechSynthesis.speak(u);
}
function scheduleTimer(onEnd){
  clearTimeout(timer);
  const words=(SCENES[idx].vo||'').split(/\s+/).length;
  const ms=Math.max(8000, words/2.6*1000);
  timer=setTimeout(()=>{ if(playing) onEnd(); }, ms);
}
// Studio narration: play pre-generated ElevenLabs MP3s when present; fall back to the
// browser voice automatically if a file is missing (so it works before audio is generated).
const audioEl=new Audio();
function setVoiceBadge(t){ const b=$('voiceBadge'); if(b) b.textContent = t==='studio'?'🎙 studio voice' : t==='browser'?'🔊 browser voice' : ''; }
function stopAudio(){ try{ audioEl.pause(); audioEl.onended=null; audioEl.onerror=null; }catch(e){} if('speechSynthesis' in window) speechSynthesis.cancel(); const pe=$('persona'); if(pe) pe.classList.remove('speaking'); }
function narrateScene(onEnd){
  if(!narrate){ setVoiceBadge(''); return scheduleTimer(onEnd); }
  { const pe=$('persona'); if(pe) pe.classList.add('speaking'); }
  let fell=false;
  const fallback=()=>{ if(fell) return; fell=true; setVoiceBadge('browser'); speak(onEnd); };
  const n=String(idx+1).padStart(2,'0');
  audioEl.src=`./audio/onboarding/scene-${n}.mp3`;
  audioEl.onended=()=>{ if(playing) onEnd(); };
  audioEl.onerror=fallback;
  const p=audioEl.play();
  if(p&&p.catch) p.catch(fallback);
  setVoiceBadge('studio');
}
function advance(){ if(idx<SCENES.length-1){ idx++; render(); runScene(); } else { stop(); } }
function runScene(){ clearTimeout(timer); stopAudio(); if(!playing) return; narrateScene(advance); }

function play(){ playing=true; $('playBtn').innerHTML='❚❚ Pause'; runScene(); }
function stop(){ playing=false; $('playBtn').innerHTML='▶ Play'; clearTimeout(timer); stopAudio(); }
function go(i){ idx=Math.max(0,Math.min(SCENES.length-1,i)); render(); if(playing) runScene(); }

$('playBtn').addEventListener('click',()=>playing?stop():play());
$('nextBtn').addEventListener('click',()=>{ const was=playing; stop(); idx=Math.min(SCENES.length-1,idx+1); render(); if(was) play(); });
$('prevBtn').addEventListener('click',()=>{ const was=playing; stop(); idx=Math.max(0,idx-1); render(); if(was) play(); });
$('narrateChk').addEventListener('change',e=>{ narrate=e.target.checked; if(playing) runScene(); });
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea')) return;
  if(e.key===' '){ e.preventDefault(); playing?stop():play(); }
  if(e.key==='ArrowRight') $('nextBtn').click();
  if(e.key==='ArrowLeft') $('prevBtn').click();
});

// script modal
$('scriptBtn').addEventListener('click',()=>{
  $('scriptBody').innerHTML=SCENES.map((s,i)=>`<div class="row"><div class="h">${String(i+1).padStart(2,'0')} · ${s.ch} — ${s.title}</div><p>${s.vo}</p></div>`).join('');
  $('scrim').classList.add('show');
});
$('closeScript').addEventListener('click',()=>$('scrim').classList.remove('show'));
$('scrim').addEventListener('click',e=>{ if(e.target===$('scrim')) $('scrim').classList.remove('show'); });

// Deep-link: ?start=<estate-id|chapter-slug> opens the tour at that chapter; &play=1 auto-plays.
// Estate properties pass their own id (e.g. start-here.js with data-estate-id="beacon").
const START_ALIASES = {
  library:'Start here', 'six-pieces':'The six pieces', 'see-it-run':'See it run',
  jeeves:'Jeeves & the governed loop', manage:'Manage it with agents', estate:'The estate map',
  foundation:'The Foundation site', community:'The membership community',
  beacon:'The governance tools', umbrella:'The governance tools', lantern:'The governance tools',
  'vendor-rfi':'The governance tools', tools:'The governance tools',
  ncw:'NCW AI Expo', learning:'NCW AI Expo', v4:'Open source', 'open-source':'Open source'
};
(function(){
  const q=new URLSearchParams(location.search);
  let want=(q.get('start')||'').toLowerCase().trim();
  if(!want && location.hash.startsWith('#start=')) want=decodeURIComponent(location.hash.slice(7)).toLowerCase().trim();
  if(want){
    const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    const ch=START_ALIASES[want] || (SCENES.find(s=>slug(s.ch)===want)||{}).ch;
    if(ch){ const i=SCENES.findIndex(s=>s.ch===ch); if(i>=0) idx=i; }
  }
  window.__startAutoplay = q.get('play')==='1' || q.get('autoplay')==='1';
})();
render();
if(window.__startAutoplay) play();
</script>
