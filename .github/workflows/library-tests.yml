name: library-tests
# Scheduled drift check of the DEPLOYED site (HTTP mode): SSL expiry, dead
# external links, broken CI badge, accidental un-publish — things the pre-deploy
# --dir gate in pages.yml can't see. Pre-deploy structural checks live there.
on:
  schedule:
    - cron: "17 13 * * *"   # 13:17 UTC daily
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target base URL"
        required: false
        default: "https://aigovops-foundation.github.io/aigovops-library-june-ken-bob"
permissions: { contents: read }
concurrency: { group: library-tests, cancel-in-progress: true }
jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - run: node scripts/test-library.mjs --base "${{ github.event.inputs.base_url || 'https://aigovops-foundation.github.io/aigovops-library-june-ken-bob' }}"
