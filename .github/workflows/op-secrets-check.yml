# Proof-of-connection: load one throwaway secret from 1Password and confirm the pipe works.
# This is plumbing — it proves the 1Password -> GitHub Actions connection before any real
# secret is needed. It references op:// only; no secret value ever lives in this file.
#
# Preconditions (human, one-time): a vault named "AiGovOps" with an item "connection-test"
# (field: value); the "GitHub Actions" service account granted READ on that vault; a repo
# secret OP_SERVICE_ACCOUNT_TOKEN set to the service-account token.
#
# Notes: load-secrets-action@v4 service-account auth uses the 1Password SDK (no CLI).
# Mac/Linux runners only — not Windows.

name: op-secrets-check

on:
  workflow_dispatch:        # run manually from the Actions tab; nothing here runs on push

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Load a secret from 1Password
        # SHA-PINNED, not @v4: this step has OP_SERVICE_ACCOUNT_TOKEN in scope — the credential
        # that is now canonical for the whole estate's secrets. A mutable tag means whoever
        # controls that repo can re-point it at any commit and exfiltrate the token on the next
        # run. A SHA can't be moved. (v4 as of 2026-07-19.)
        uses: 1password/load-secrets-action@66b1d1ae996b3f3482c8aa1c29512d87235c2a93 # v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          PING: op://AiGovOps/connection-test/value

      - name: Confirm connection (value stays masked)
        run: |
          if [ -n "$PING" ]; then
            echo "1Password connection: ok (secret loaded and masked)"
          else
            echo "1Password connection: FAILED — no value returned"
            exit 1
          fi
