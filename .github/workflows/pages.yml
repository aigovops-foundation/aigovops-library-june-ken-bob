name: pages
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: true }
jobs:
  deploy:
    environment: { name: github-pages, url: "${{ steps.deploy.outputs.page_url }}" }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/build-docs.mjs   # inline the single-source Yes-Gate logic into docs/
      # The pulse self-test regenerates docs/pulse.html; if it ever breaks it must NOT block the
      # public docs deploy (the prior synchronous-call bug did exactly that). Non-fatal by design.
      - run: cd core && node scripts/pulse.mjs   # exercise the engine → docs/pulse.html
        continue-on-error: true
      - run: node scripts/test-library.mjs --dir docs   # hard gate: structure/link/SEO checks must pass before deploy
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs }
      - id: deploy
        uses: actions/deploy-pages@v4
