name: secret-scan

# This repo adopting the estate's shared reusable secret scanner — the proof-of-pattern for
# rolling it out across the estate (one `uses:` line per repo instead of each reinventing a
# scanner). The two ignored globs are this repo's OWN scanner test fixtures, which contain
# example secret shapes on purpose.

on:
  push:
  pull_request:

jobs:
  secret-scan:
    uses: ./.github/workflows/reusable-secret-scan.yml
    with:
      ignore_globs: "core/test/scanners.test.mjs core/test/run-skill.test.mjs"
