name: ci
on: [push, pull_request]
jobs:
  core-tests:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: core } }
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - run: node --test
      # Phase D — govern the build with its own gate: the signed audit trail must
      # verify (tamper-detection itself is covered by test/govgate.test.mjs).
      - run: npm run gate
      # Phase D — the prose governance skills as executable gates: accessibility-
      # audit on shipped pages + security-privacy-review (secret scan) on configs.
      - run: npm run scan

  # Discoverability gate — keep the published site's SEO invariants from regressing
  # (canonical, JSON-LD, og:url, internal links, sitemap coverage). Runs from repo root.
  site-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20 }
      - run: node scripts/runbooks/seo-drift-check.mjs
