name: ci
on: [push, pull_request]
jobs:
  core-tests:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: core } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node --test
      # Phase D — govern the build with its own gate: the signed audit trail must
      # verify (tamper-detection itself is covered by test/govgate.test.mjs).
      - run: npm run gate
      # Phase D — the prose governance skills as executable gates: accessibility-
      # audit on shipped pages + security-privacy-review (secret scan) on configs.
      - run: npm run scan
