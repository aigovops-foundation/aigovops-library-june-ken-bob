name: reusable-secret-scan

# A reusable, dependency-free secret scanner ANY estate repo can call in one line — no external
# action to pin or trust beyond checkout. It greps tracked files for HIGH-CONFIDENCE secret
# SHAPES (prefixed tokens, AWS keys, private-key headers), the same shapes Omni's
# scripts/check_secrets.sh uses. Secrets belong in 1Password; nothing of this shape should ever
# sit in a tracked file.
#
# Adopt it from another repo with:
#   jobs:
#     secret-scan:
#       uses: aigovops-foundation/aigovops-library-june-ken-bob/.github/workflows/reusable-secret-scan.yml@main
#       with:
#         ignore_globs: "path/to/scanner-fixtures.*"   # optional; see below
#
# WHY ignore_globs. A secret-scanner's OWN tests legitimately contain example secret shapes, and
# so do docs that quote AWS's documented example key. Rather than weaken the pattern (which would
# blind it to real secrets), a repo names its fixture files here. AWS's public example key
# (AKIAIOSFODNN7EXAMPLE) is excluded by default — it is safe by definition.

on:
  workflow_call:
    inputs:
      ignore_globs:
        description: "Space-separated shell globs of files to skip (a repo's own scanner fixtures)."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Scan tracked files for committed secret values
        env:
          IGNORE_GLOBS: ${{ inputs.ignore_globs }}
        run: |
          set -uo pipefail
          # High-confidence, low-false-positive secret shapes. Deliberately NOT generic base64.
          PAT='ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{40,}|AKIA[0-9A-Z]{16}|sk_live_[A-Za-z0-9]{20,}|xox[baprs]-[A-Za-z0-9-]{12,}|-----BEGIN ([A-Z]+ )?PRIVATE KEY-----|cfat_[A-Za-z0-9_-]{20,}|ops_[A-Za-z0-9._-]{50,}'
          AWS_EXAMPLE='AKIAIOSFODNN7EXAMPLE'   # AWS's own documented example — safe by definition
          hits=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            skip=0
            for g in $IGNORE_GLOBS; do
              case "$f" in $g) skip=1; break;; esac
            done
            [ "$skip" = "1" ] && continue
            # matches, minus the documented AWS example
            m=$(grep -EnI "$PAT" "$f" 2>/dev/null | grep -v "$AWS_EXAMPLE" || true)
            if [ -n "$m" ]; then
              echo "::error file=$f::high-confidence secret value found in a tracked file"
              echo "$m" | sed 's/\(.\{80\}\).*/\1…/' | head -3
              hits=1
            fi
          done < <(git ls-files)
          if [ "$hits" = "1" ]; then
            echo ""
            echo "Secrets live in 1Password (op://AiGovOps/<name>), never in a tracked file."
            echo "If a hit is a legitimate test fixture, add its path to this job's ignore_globs."
            exit 1
          fi
          echo "secret-scan: clean — no high-confidence secret shapes in tracked files."
