# Same image, three lives (local / VPS / canonical) — only the env differs.
# Local lab:  (from core/)  docker compose up   →  http://localhost:8787/console
# Build context is the repo root (..) so the image includes plan/ (the skills).
services:
  core:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - ./ledger:/app/core/ledger   # append-only signed evidence ledger (persists)
      - ./keys:/app/core/keys       # Ed25519 keys (gitignored; KMS/secret store in prod)
    restart: unless-stopped
