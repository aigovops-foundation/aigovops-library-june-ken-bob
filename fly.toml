# Fly.io deployment for the AiGovOps Library governed core.
# Prepared, not deployed — per CLAUDE.md, the first deploy (creating the app,
# auth, secrets, a public URL) is Bob's/Ken's irreversible click. See DEPLOY.md.
#
# Rename `app` and set `primary_region` before `fly launch`/`fly deploy`.

app = "aigovops-library-core"
primary_region = "iad"            # pick yours: `flyctl platform regions`

[build]
  dockerfile = "Dockerfile"        # repo-root Dockerfile (includes core/ + plan/)

[env]
  PORT = "8787"
  # keys + ledger live on the mounted volume below, so they persist across deploys
  KEYS_DIR = "/data/keys"
  LEDGER_DIR = "/data/ledger"
  # CORS allow-list: the public hub plus the deployed app's own origin
  ALLOWED_ORIGINS = "https://aigovops-foundation.github.io"
  ALLOW_CLOUD = "false"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false      # scale to zero when idle ($0)
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "aigov_data"            # persists /data/keys (Ed25519) + /data/ledger (receipts)
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"                  # dependency-free Node core is tiny
