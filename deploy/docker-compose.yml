# deploy/docker-compose.yml — the full AiGovOps backend stack for scale.
# The governed core + the datastores and services the 100k-user topology needs.
# Secrets come from .env, which is rendered from 1Password (deploy/.env.1password.tmpl)
# by deploy/bootstrap.sh — NO secret values live in this file or the repo.
#
#   bash deploy/bootstrap.sh            # render secrets + bring the stack up
#   docker compose -f deploy/docker-compose.yml ps
#
# Notes: Vault and Keycloak run in DEV mode here for a one-command local stack;
# in production they run as managed/HA services (see deploy/README.md). The core
# image is dependency-free; opt-in deps (pg, redis) are installed in its own layer
# only when those profiles are used.
name: aigovops

services:
  core:
    build: { context: .., dockerfile: Dockerfile }
    env_file: [ .env ]
    environment:
      PORT: "8787"
      SECRETS_PROFILE: "${SECRETS_PROFILE:-1password}"
      DATABASE_URL: "${DATABASE_URL:-postgres://aigov:aigov@postgres:5432/aigov}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      VAULT_ADDR: "${VAULT_ADDR:-http://vault:8200}"
      POLICY_ENGINE: "${POLICY_ENGINE:-opa}"
      OPA_URL: "${OPA_URL:-http://opa:8181}"
    ports: [ "8787:8787" ]
    volumes:
      - core_keys:/app/core/keys
      - core_ledger:/app/core/ledger
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/livez').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aigov
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-aigov}"
      POSTGRES_DB: aigov
    volumes: [ "pg_data:/var/lib/postgresql/data" ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigov"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes: [ "redis_data:/data" ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.16
    cap_add: [ "IPC_LOCK" ]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_TOKEN:-dev-root}"   # DEV ONLY — prod uses sealed/HA Vault
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports: [ "8200:8200" ]
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: [ "start-dev", "--http-port=8080" ]          # DEV ONLY — prod uses start + a DB + TLS
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
    ports: [ "8080:8080" ]
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:0.64.0
    command: [ "run", "--server", "--addr=0.0.0.0:8181", "/policy" ]
    volumes: [ "../core/policy:/policy:ro" ]
    ports: [ "8181:8181" ]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes: [ "./prometheus.yml:/etc/prometheus/prometheus.yml:ro" ]
    ports: [ "9090:9090" ]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes: [ "./grafana/provisioning:/etc/grafana/provisioning:ro" ]
    ports: [ "3000:3000" ]
    depends_on: [ prometheus ]
    restart: unless-stopped

volumes:
  core_keys: {}
  core_ledger: {}
  pg_data: {}
  redis_data: {}
