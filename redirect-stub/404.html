<script>
// Preserve deep links: /aigovops-library-june-ken-bob/<path> -> the gated Library's same <path>.
// Plain segments only — anything odd falls back to the Library door.
(function(){
  var m = location.pathname.match(/^\/aigovops-library-june-ken-bob\/(.*)$/);
  var rest = m ? m[1] : "";
  if (!/^[A-Za-z0-9._\/-]*$/.test(rest) || rest.indexOf("..") !== -1) rest = "";
  location.replace("https://community.aigovops-foundation.com/library/" + rest);
})();
</script>
